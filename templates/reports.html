<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
</head>
<body>

<h1>Expense Reports</h1>

<table border="1">
    <tr>
        <th>Category</th>
        <th>Total Expense</th>
    </tr>

    {% for e in expenses %}
    <tr>
        <td>{{ e.category }}</td>
        <td>₹{{ e.total }}</td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/dashboard">
    Back to Dashboard
</a>

</body>
</html>
